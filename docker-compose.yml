version: '3.9'

services:

  # ─── Infrastructure ───────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: eda-postgres
    environment:
      POSTGRES_DB: edadb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: eda-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: eda-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Mock OIDC server — simulates Okta locally.
  # In staging/production, set OIDC_ISSUER_URI to your real Okta issuer.
  mock-oidc:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    container_name: eda-mock-oidc
    ports:
      - "8090:8090"
    environment:
      SERVER_PORT: 8090
      JSON_CONFIG: |
        {
          "interactiveLogin": true,
          "httpServer": "NettyWrapper",
          "tokenCallbacks": [
            {
              "issuerId": "okta",
              "tokenExpiry": 3600,
              "requestMappings": [
                {
                  "requestParam": "scope",
                  "match": "openid",
                  "claims": {
                    "tenant_id": "tenant-1",
                    "roles": ["TENANT_ADMIN"]
                  }
                }
              ]
            }
          ]
        }
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8090/okta/.well-known/openid-configuration || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Observability ────────────────────────────────────────────────────────

  loki:
    image: grafana/loki:3.0.0
    container_name: eda-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  tempo:
    image: grafana/tempo:2.5.0
    container_name: eda-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"
      - "4317:4317"   # OTel gRPC
      - "4318:4318"   # OTel HTTP
    volumes:
      - ./docker/tempo/tempo.yaml:/etc/tempo.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: eda-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.1.0
    container_name: eda-grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
      - tempo
      - prometheus

  # ─── Migration (runs once then exits) ─────────────────────────────────────

  db-migrations:
    build:
      context: .
      dockerfile: services/db-migrations/Dockerfile
    container_name: eda-db-migrations
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/edadb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─── Application Services ─────────────────────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: eda-api-gateway
    ports:
      - "9080:8080"
    environment:
      OIDC_ISSUER_URI: http://mock-oidc:8090/okta
      COMMAND_SERVICE_URL: http://example-command-service:8081
      QUERY_SERVICE_URL: http://example-query-service:8082
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mock-oidc:
        condition: service_healthy
      redis:
        condition: service_healthy

  example-command-service:
    build:
      context: .
      dockerfile: services/example-command-service/Dockerfile
    container_name: eda-command-service
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/edadb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      OIDC_ISSUER_URI: http://mock-oidc:8090/okta
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EVENTS_BROKER: kafka
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      db-migrations:
        condition: service_completed_successfully

  example-query-service:
    build:
      context: .
      dockerfile: services/example-query-service/Dockerfile
    container_name: eda-query-service
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/edadb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      OIDC_ISSUER_URI: http://mock-oidc:8090/okta
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EVENTS_BROKER: kafka
      KAFKA_TOPICS: example.created
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      db-migrations:
        condition: service_completed_successfully

  example-consumer-service:
    build:
      context: .
      dockerfile: services/example-consumer-service/Dockerfile
    container_name: eda-consumer-service
    ports:
      - "8083:8083"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/edadb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EVENTS_BROKER: kafka
      KAFKA_TOPICS: example.created
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      db-migrations:
        condition: service_completed_successfully

  outbox-relay:
    build:
      context: .
      dockerfile: services/outbox-relay/Dockerfile
    container_name: eda-outbox-relay
    ports:
      - "8084:8084"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/edadb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EVENTS_BROKER: kafka
      RELAY_POLL_INTERVAL_MS: 1000
      RELAY_BATCH_SIZE: 50
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      db-migrations:
        condition: service_completed_successfully

volumes:
  postgres_data:
  grafana_data:
