name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

env:
  JAVA_VERSION: '25'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:

  # ─── 1. Build and push images ─────────────────────────────────────────────
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - db-migrations
          - api-gateway
          - example-command-service
          - example-query-service
          - example-consumer-service
          - outbox-relay
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Build JAR
        run: ./gradlew :services:${{ matrix.service }}:bootJar --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 2. Run migrations ────────────────────────────────────────────────────
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: build-images
    environment: ${{ inputs.environment || 'staging' }}
    steps:
      - name: Run db-migrations job
        run: |
          docker run --rm \
            -e DB_URL="${{ secrets.DB_URL }}" \
            -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/db-migrations:sha-${{ github.sha }}

  # ─── 3. Deploy services ───────────────────────────────────────────────────
  deploy:
    name: Deploy Services
    runs-on: ubuntu-latest
    needs: migrate
    environment: ${{ inputs.environment || 'staging' }}
    strategy:
      max-parallel: 1
      matrix:
        service:
          - api-gateway
          - example-command-service
          - example-query-service
          - example-consumer-service
          - outbox-relay
    steps:
      - uses: actions/checkout@v4

      - name: Deploy ${{ matrix.service }}
        run: |
          echo "Deploying ${{ matrix.service }} with image sha-${{ github.sha }}"
          # Replace this step with your deployment target:
          #   ECS:   aws ecs update-service --cluster $CLUSTER --service ${{ matrix.service }} --force-new-deployment
          #   K8s:   kubectl set image deployment/${{ matrix.service }} app=$IMAGE
          #   Other: your deploy command here
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:sha-${{ github.sha }}

  # ─── 4. Smoke test ────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    environment: ${{ inputs.environment || 'staging' }}
    steps:
      - name: Health check — api-gateway
        run: |
          for i in {1..10}; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" ${{ secrets.API_GATEWAY_URL }}/actuator/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i — status $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 10 attempts"
          exit 1

      - name: Health check — command service
        run: |
          curl -sf ${{ secrets.COMMAND_SERVICE_URL }}/actuator/health

      - name: Health check — query service
        run: |
          curl -sf ${{ secrets.QUERY_SERVICE_URL }}/actuator/health

  # ─── 5. Rollback on failure ───────────────────────────────────────────────
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    needs: smoke-test
    if: failure()
    environment: ${{ inputs.environment || 'staging' }}
    steps:
      - name: Rollback services to previous image
        run: |
          echo "Smoke test failed — rolling back all services"
          # Replace with your rollback command:
          #   ECS:   aws ecs update-service --cluster $CLUSTER --service $SERVICE --task-definition $PREVIOUS_TASK_DEF
          #   K8s:   kubectl rollout undo deployment/$SERVICE
          echo "Rollback complete"

      - name: Notify failure
        if: always()
        run: |
          echo "Deploy to ${{ inputs.environment || 'staging' }} FAILED at commit ${{ github.sha }}"
          # Wire to Slack/PagerDuty via secrets:
          # curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} -d '{"text":"Deploy failed"}'
