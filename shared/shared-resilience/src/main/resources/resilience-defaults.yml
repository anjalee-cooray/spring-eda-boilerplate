resilience4j:
  circuitbreaker:
    configs:
      # Default config inherited by all instances unless overridden
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3s
        wait-duration-in-open-state: 30s
        permitted-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - java.net.ConnectException

      # Tighter config for external payment APIs — fail fast, wait longer
      external-api:
        sliding-window-size: 10
        minimum-number-of-calls: 3
        failure-rate-threshold: 40
        slow-call-duration-threshold: 5s
        wait-duration-in-open-state: 60s
        permitted-calls-in-half-open-state: 2
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - java.net.ConnectException

    instances:
      # Stripe payment API — uses external-api config
      stripe:
        base-config: external-api

      # Internal service-to-service calls — uses default config
      command-service:
        base-config: default

      query-service:
        base-config: default
