resilience4j:

  # ── Circuit Breaker ────────────────────────────────────────────────────────
  #
  # Decorator order (outermost → innermost): CircuitBreaker → Retry → call
  #
  # The circuit breaker wraps the retry so it sees the final outcome after all
  # retry attempts are exhausted. This prevents individual retry attempts from
  # counting as separate failures and tripping the breaker prematurely.
  #
  circuitbreaker:
    configs:
      # Inherited by all instances unless overridden
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3s
        wait-duration-in-open-state: 30s
        permitted-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - java.net.ConnectException

      # For external payment APIs — tighter threshold, longer recovery wait
      external-api:
        sliding-window-size: 10
        minimum-number-of-calls: 3
        failure-rate-threshold: 40
        slow-call-duration-threshold: 5s
        wait-duration-in-open-state: 60s
        permitted-calls-in-half-open-state: 2
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - java.net.ConnectException

    instances:
      stripe:
        base-config: external-api
      command-service:
        base-config: default
      query-service:
        base-config: default

  # ── Retry ──────────────────────────────────────────────────────────────────
  #
  # Only retry on network-level failures (IOException, ConnectException,
  # TimeoutException). Never retry on business errors (PaymentException,
  # validation failures) — those will not succeed on retry.
  #
  # Exponential backoff: wait 500ms, then 1s, then 2s between attempts.
  # This gives the downstream service time to recover between retries.
  #
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.net.ConnectException
          - java.util.concurrent.TimeoutException
        ignore-exceptions:
          - java.lang.IllegalArgumentException
          - java.lang.IllegalStateException

      # External APIs: fewer retries, longer waits — avoid hammering a struggling service
      external-api:
        max-attempts: 2
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.net.ConnectException
          - java.util.concurrent.TimeoutException
        ignore-exceptions:
          - java.lang.IllegalArgumentException
          - java.lang.IllegalStateException

    instances:
      stripe:
        base-config: external-api
      command-service:
        base-config: default
      query-service:
        base-config: default
