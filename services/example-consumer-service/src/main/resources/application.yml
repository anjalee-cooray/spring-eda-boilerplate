spring:
  application:
    name: example-consumer-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/edadb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    # Producer config required by DeadLetterPublishingRecoverer to write failed
    # messages to the DLQ topic after all retry attempts are exhausted.
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5

app:
  events:
    # ── Broker selection ────────────────────────────────────────────────────
    # Set EVENTS_BROKER=kafka  to use Kafka (default, local dev)
    # Set EVENTS_BROKER=sns    to use AWS SNS + SQS (production AWS)
    broker: ${EVENTS_BROKER:kafka}

    # ── Kafka config (active when broker=kafka) ──────────────────────────
    kafka:
      topics: ${KAFKA_TOPICS:example.created}
      # DLQ topic naming: {original-topic}.dlq — one per consumed topic
      dlq-topics: ${KAFKA_DLQ_TOPICS:example.created.dlq}

    # ── SNS/SQS config (active when broker=sns) ─────────────────────────
    # Uncomment and populate when switching to SNS/SQS.
    # For local dev: start LocalStack (docker compose --profile sns up localstack)
    # and set endpoint-override to http://localhost:4566.
    #
    # sqs:
    #   queue-url: ${SQS_QUEUE_URL:http://localhost:4566/000000000000/example-created}
    #   dlq-queue-url: ${SQS_DLQ_QUEUE_URL:http://localhost:4566/000000000000/example-created-dlq}
    #   poll-interval-ms: ${SQS_POLL_INTERVAL_MS:1000}
    #   dlq-poll-interval-ms: ${SQS_DLQ_POLL_INTERVAL_MS:5000}
    #   region: ${AWS_REGION:us-east-1}
    #   endpoint-override: ${SQS_ENDPOINT_OVERRIDE:}   # leave blank in production
    # sns:
    #   region: ${AWS_REGION:us-east-1}
    #   endpoint-override: ${SNS_ENDPOINT_OVERRIDE:}   # leave blank in production

server:
  port: ${PORT:8083}
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:30s}

app:
  kafka:
    # How often KafkaConsumerLagMetrics refreshes lag from AdminClient.
    # Keep this > Prometheus scrape interval (default 15s) to avoid stale reads.
    lag-refresh-ms: ${KAFKA_LAG_REFRESH_MS:15000}

  sqs:
    # How often SqsConsumerLagMetrics refreshes queue depth from SQS GetQueueAttributes.
    # Keep this > Prometheus scrape interval (default 15s) to avoid stale reads.
    lag-refresh-ms: ${SQS_LAG_REFRESH_MS:15000}

  consumer:
    backpressure:
      # Pause all Kafka listeners when max partition lag exceeds this threshold.
      # Consumers stop fetching from the broker until lag drops to lag-resume-threshold.
      lag-pause-threshold: ${CONSUMER_LAG_PAUSE_THRESHOLD:10000}
      # Resume fetching once max partition lag drops below this threshold.
      # Must be < lag-pause-threshold to avoid oscillation.
      lag-resume-threshold: ${CONSUMER_LAG_RESUME_THRESHOLD:1000}
      # How often KafkaBackpressureController checks lag and adjusts containers.
      check-interval-ms: ${CONSUMER_BACKPRESSURE_CHECK_MS:5000}
      # Log a warning when any partition lag exceeds this value.
      lag-warn-threshold: ${CONSUMER_LAG_WARN_THRESHOLD:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,consumer-health
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0

logging:
  loki:
    url: ${LOGGING_LOKI_URL:http://localhost:3100}
