spring:
  application:
    name: api-gateway

  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8090/okta}

  cloud:
    gateway:
      routes:
        # ── Command routes ──────────────────────────────────────────────────
        # POST/PUT/DELETE only. No Retry filter — commands are not idempotent
        # at the gateway level. Clients must retry with the same Idempotency-Key.
        # The IdempotencyFilter handles deduplication via Redis.
        - id: command-service
          uri: ${COMMAND_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/commands/**
          filters:
            - StripPrefix=1
            # Rate limit by tenant — token bucket in Redis, 20 req/s sustained, burst 40.
            # Adjust replenishRate/burstCapacity per pricing tier by replacing this with
            # a custom RateLimiter bean (see RateLimiterConfig.java for guidance).
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_RATE:20}
                redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:40}
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@tenantKeyResolver}"
            - name: CircuitBreaker
              args:
                name: command-service
                fallbackUri: forward:/fallback/command-service

        # ── Query routes ────────────────────────────────────────────────────
        # GET only. Safe to retry — GET is idempotent by definition.
        # Retry runs inside the circuit breaker: CB sees final outcome after retries.
        - id: query-service
          uri: ${QUERY_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/queries/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH_RATE:20}
                redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST_CAPACITY:40}
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@tenantKeyResolver}"
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                methods: GET
                backoff:
                  firstBackoff: 500ms
                  maxBackoff: 2000ms
                  factor: 2
                  basedOnPreviousValue: false
            - name: CircuitBreaker
              args:
                name: query-service
                fallbackUri: forward:/fallback/query-service

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0

logging:
  loki:
    url: ${LOGGING_LOKI_URL:http://localhost:3100}

# Idempotency cache TTL (seconds) — how long a response is cached in Redis
app:
  idempotency:
    ttl-hours: 24

# Rate limiting — token bucket per tenant, backed by Redis.
# replenishRate: sustained requests per second (tokens added per second)
# burstCapacity: max tokens in bucket (handles burst traffic above sustained rate)
# Override per environment via env vars: RATE_LIMIT_REPLENISH_RATE, RATE_LIMIT_BURST_CAPACITY
# For per-tier limits (Free/Pro/Enterprise), implement a custom RateLimiter bean
# that reads the tenant's tier from a cache/DB — see RateLimiterConfig.java.
spring:
  cloud:
    gateway:
      redis-rate-limiter:
        replenish-rate: ${RATE_LIMIT_REPLENISH_RATE:20}
        burst-capacity: ${RATE_LIMIT_BURST_CAPACITY:40}
        requested-tokens: 1

# Circuit breaker config for gateway routes
resilience4j:
  circuitbreaker:
    instances:
      command-service:
        sliding-window-size: 20
        failure-rate-threshold: 60
        wait-duration-in-open-state: 10s
        permitted-calls-in-half-open-state: 5
      query-service:
        sliding-window-size: 20
        failure-rate-threshold: 60
        wait-duration-in-open-state: 10s
        permitted-calls-in-half-open-state: 5
