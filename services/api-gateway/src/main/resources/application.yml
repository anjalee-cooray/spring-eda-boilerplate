spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8090/okta}

  cloud:
    gateway:
      routes:
        - id: command-service
          uri: ${COMMAND_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/commands/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: command-service
                fallbackUri: forward:/fallback/command-service

        - id: query-service
          uri: ${QUERY_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/queries/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: query-service
                fallbackUri: forward:/fallback/query-service

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0

logging:
  loki:
    url: ${LOGGING_LOKI_URL:http://localhost:3100}

# Circuit breaker config for gateway routes
# shared-resilience provides the base defaults — override per instance here if needed
resilience4j:
  circuitbreaker:
    instances:
      command-service:
        sliding-window-size: 20
        failure-rate-threshold: 60
        wait-duration-in-open-state: 10s
        permitted-calls-in-half-open-state: 5
      query-service:
        sliding-window-size: 20
        failure-rate-threshold: 60
        wait-duration-in-open-state: 10s
        permitted-calls-in-half-open-state: 5
