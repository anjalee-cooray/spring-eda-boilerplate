spring:
  application:
    name: example-command-service

  # Fetch config from config-service on startup.
  # optional: means the service starts with local defaults if config-service is unreachable.
  # Remove 'optional:' in production to fail fast when config is unavailable.
  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/edadb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8080/realms/eda}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5

app:
  events:
    # ── Broker selection ────────────────────────────────────────────────────
    # Set EVENTS_BROKER=kafka  to use Kafka (default, local dev)
    # Set EVENTS_BROKER=sns    to use AWS SNS + SQS (production AWS)
    broker: ${EVENTS_BROKER:kafka}

    # ── SNS/SQS config (active when broker=sns) ─────────────────────────
    # Command service only publishes — it does not consume from SQS.
    # Uncomment when switching to SNS/SQS.
    #
    # sns:
    #   default-topic-arn: ${SNS_DEFAULT_TOPIC_ARN:arn:aws:sns:us-east-1:000000000000:example-events}
    #   topic-arns:
    #     example.created: ${SNS_TOPIC_EXAMPLE_CREATED:arn:aws:sns:us-east-1:000000000000:example-created}
    #   region: ${AWS_REGION:us-east-1}
    #   endpoint-override: ${SNS_ENDPOINT_OVERRIDE:}   # leave blank in production

server:
  port: ${PORT:8081}
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:30s}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0

logging:
  loki:
    url: ${LOGGING_LOKI_URL:http://localhost:3100}
